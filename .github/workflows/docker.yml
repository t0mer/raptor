name: Docker

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (leave blank to use the latest git tag, else auto-compute)"
        required: false
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions:
  contents: read

jobs:
  docker:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          # Prefer an explicit input, then the latest git tag, then a computed
          # date-based version — never empty (an empty tag is an invalid ref).
          VERSION="$INPUT_VERSION"
          if [ -z "$VERSION" ]; then
            VERSION="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          fi
          if [ -z "$VERSION" ]; then
            VERSION="$(./scripts/next-version.sh)"
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::could not resolve a version"; exit 1
          fi
          echo "Resolved version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: |
            techblog/raptor:latest
            techblog/raptor:${{ steps.version.outputs.version }}
