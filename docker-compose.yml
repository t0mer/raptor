services:
  raptor:
    image: techblog/raptor:latest
    build:
      context: .
      args:
        VERSION: dev
    ports:
      - "8084:8084" # app + capture + API
      - "2525:2525" # inbound email (Phase 3)
      - "5354:5354/udp" # inbound DNS  (Phase 3)
    volumes:
      - ./data:/data
    environment:
      RAPTOR_BASE_URL: http://localhost:8084
      RAPTOR_LOG_LEVEL: info
    restart: unless-stopped
